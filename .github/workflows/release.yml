name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: drive-mirror
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: drive-mirror
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: drive-mirror
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: drive-mirror
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: drive-mirror.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell Compress-Archive -Path ${{ matrix.binary_name }} -DestinationPath ../../../drive-mirror-${{ matrix.target }}.zip
          else
            tar czf ../../../drive-mirror-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drive-mirror-${{ matrix.target }}
          path: drive-mirror-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: drive-mirror-*
          merge-multiple: true

      - name: Generate Checksums
        run: |
          for f in drive-mirror-*; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            drive-mirror-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
